<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 500: Absolute Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .flip-card { perspective: 1000px; height: 300px; width: 100%; }
        .flip-inner { transition: 0.6s; transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; position: relative; }
        .flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 2rem;
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 1px solid #333;
        }
        .back { transform: rotateY(180deg); flex-direction: column; background: #181818; }
        .btn-ui { 
            background: #fff; color: #000; height: 55px; border-radius: 1.2rem;
            font-weight: 900; text-transform: uppercase; font-size: 0.7rem;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-ui:active { transform: scale(0.95); opacity: 0.8; }
        .btn-secondary { background: #111; color: #fff; border: 1px solid #333; }
        .btn-scramble { background: #222; color: #fbbf24; border: 1px solid #fbbf24; }
        .nav-btn { background: #111; border: 1px solid #333; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal { position: fixed; inset: 0; background: #0a0a0a; z-index: 100; padding: 30px; display: flex; flex-direction: column; }
        canvas { background: #000; border: 2px solid #333; border-radius: 1.5rem; touch-action: none; width: 100%; height: 350px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="app-container" id="mainApp">
    <div class="flex justify-between items-center mb-6">
        <h1 class="font-black text-xl tracking-tighter">HSK 500 <span class="text-zinc-500 text-xs">3.0</span></h1>
        <div class="text-[10px] font-bold bg-zinc-900 px-3 py-1 rounded-full text-zinc-400" id="counter">1 / 500</div>
    </div>

    <div class="w-full h-1 bg-zinc-900 rounded-full mb-8 overflow-hidden">
        <div id="progressBar" class="h-full bg-white w-0 transition-all duration-500"></div>
    </div>

    <div class="flex items-center gap-4 mb-8">
        <button onclick="prev()" class="nav-btn">←</button>
        <div class="flip-card">
            <div id="card" class="flip-inner" onclick="flip()">
                <div class="front text-7xl font-black" id="h-main"></div>
                <div class="back text-center p-6">
                    <div id="p-main" class="text-2xl font-black mb-2 text-white"></div>
                    <div id="e-main" class="text-zinc-400 font-medium italic text-sm"></div>
                </div>
            </div>
        </div>
        <button onclick="next()" class="nav-btn">→</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <button onclick="mark('mastered')" class="btn-ui">Mastered</button>
        <button onclick="mark('review')" class="btn-ui btn-secondary">Review</button>
        <button onclick="openInfo()" class="btn-ui btn-secondary text-blue-400">Info</button>
        <button onclick="openDraw()" class="btn-ui btn-secondary text-green-400">Draw</button>
        <button onclick="scramble()" class="btn-ui btn-scramble col-span-2">Scramble Deck</button>
    </div>

    <div id="wordList" class="flex flex-col gap-2 max-h-48 overflow-y-auto no-scrollbar border-t border-zinc-900 pt-4"></div>
</div>

<div id="infoModal" class="modal hidden">
    <div class="flex justify-between items-start mb-6">
        <h2 class="text-6xl font-black" id="i-h"></h2>
        <button onclick="closeModals()" class="text-4xl text-zinc-600">&times;</button>
    </div>
    <div class="space-y-4 flex-1 overflow-y-auto no-scrollbar">
        <div class="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800 flex justify-center items-center">
            <img id="strokeGif" src="" class="w-32 h-32 invert contrast-125">
        </div>
        <div class="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800">
            <p class="text-[10px] font-black text-zinc-500 uppercase mb-1">Meaning</p>
            <p id="i-m" class="text-lg font-bold text-white"></p>
        </div>
        <div class="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800">
            <p class="text-[10px] font-black text-zinc-500 uppercase mb-1">Radical Info</p>
            <div class="flex items-baseline gap-2">
                <span id="i-r" class="text-3xl font-bold text-white"></span>
                <span id="i-rp" class="text-sm text-zinc-400 font-bold"></span>
            </div>
            <p id="i-rm" class="text-sm text-zinc-500 mt-1"></p>
        </div>
    </div>
    <button onclick="closeModals()" class="btn-ui w-full mt-4">Back</button>
</div>

<div id="drawModal" class="modal hidden">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-black uppercase">Draw: <span id="drawT" class="text-white"></span></h2>
        <button onclick="closeModals()" class="text-4xl text-zinc-600">&times;</button>
    </div>
    <canvas id="canvas"></canvas>
    <div id="drawStatus" class="mt-4 text-center font-black text-xs h-6 uppercase tracking-widest"></div>
    <div class="grid grid-cols-2 gap-4 mt-auto">
        <button onclick="clearCanvas()" class="btn-ui btn-secondary">Clear</button>
        <button onclick="verify()" class="btn-ui">Verify</button>
    </div>
</div>

<div id="endModal" class="modal hidden items-center justify-center text-center">
    <h2 class="text-4xl font-black mb-2">COMPLETE</h2>
    <p class="text-zinc-500 mb-10">You've reached the end of the 500 words.</p>
    <div class="w-full space-y-4">
        <button onclick="location.reload()" class="btn-ui w-full">Restart Session</button>
        <button onclick="closeModals()" class="text-zinc-600 font-bold">Back to List</button>
    </div>
</div>

let wordSet = [];
let index = 0;
let drawing = false;
let strokes = [];

function init() {
    const saved = JSON.parse(localStorage.getItem('hsk500_v3')) || {};
    wordSet = vocabRaw.map((v, i) => ({
        id: i, h: v[0], p: v[1], e: v[2], status: saved[v[0]] || 'normal'
    }));
    updateUI();
}

function updateUI() {
    const w = wordSet[index];
    document.getElementById('h-main').innerText = w.h;
    document.getElementById('p-main').innerText = w.p;
    document.getElementById('e-main').innerText = w.e;
    // Ensuring the counter displays 1-500
    document.getElementById('counter').innerText = `${index + 1} / ${wordSet.length}`;
    document.getElementById('progressBar').style.width = ((index + 1) / wordSet.length * 100) + '%';
    document.getElementById('card').classList.remove('flipped');
    renderList();
}

function next() {
    if(index < wordSet.length - 1) { 
        index++; 
        updateUI(); 
    } else { 
        document.getElementById('endModal').classList.remove('hidden'); 
    }
}

function prev() { 
    if(index > 0) { 
        index--; 
        updateUI(); 
    } 
}

function flip() { 
    document.getElementById('card').classList.toggle('flipped'); 
}

function scramble() {
    for (let i = wordSet.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [wordSet[i], wordSet[j]] = [wordSet[j], wordSet[i]];
    }
    index = 0;
    updateUI();
}

function mark(s) {
    wordSet[index].status = s;
    const progress = JSON.parse(localStorage.getItem('hsk500_v3')) || {};
    progress[wordSet[index].h] = s;
    localStorage.setItem('hsk500_v3', JSON.stringify(progress));
    next();
}

function openInfo() {
    const w = wordSet[index];
    const char = w.h[0];
    const r = radData[char] || ["?", "?", "Radical info"];
    document.getElementById('i-h').innerText = char;
    document.getElementById('i-m').innerText = w.e;
    document.getElementById('i-r').innerText = r[0];
    document.getElementById('i-rp').innerText = r[1];
    document.getElementById('i-rm').innerText = r[2];
    document.getElementById('strokeGif').src = `https://www.mdbg.net/chinese/dictionary-images/stroke-anim/${char.charCodeAt(0)}.gif`;
    document.getElementById('infoModal').classList.remove('hidden');
}

function openDraw() {
    document.getElementById('drawT').innerText = wordSet[index].h[0];
    document.getElementById('drawModal').classList.remove('hidden');
    clearCanvas();
}

function closeModals() {
    document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
}

// Drawing Logic
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = 350;

function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
}

canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
window.addEventListener('mouseup', () => drawing = false);
window.addEventListener('touchend', () => drawing = false);

function start(e) {
    drawing = true;
    const p = getXY(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    strokes.push([[p.x], [p.y], [Date.now()]]);
}

function draw(e) {
    if(!drawing) return;
    const p = getXY(e);
    ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.strokeStyle = '#fff';
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    const s = strokes[strokes.length-1];
    s[0].push(p.x); s[1].push(p.y); s[2].push(Date.now());
}

function clearCanvas() { 
    ctx.clearRect(0,0,400,350); 
    strokes = []; 
    document.getElementById('drawStatus').innerText = ""; 
    document.getElementById('drawStatus').className = "mt-4 text-center font-black text-xs h-6 uppercase tracking-widest";
}

function verify() {
    const target = wordSet[index].h[0];
    const status = document.getElementById('drawStatus');
    status.innerText = "Checking...";
    fetch("https://www.google.com.tw/inputtools/request?ime=handwriting&app=autofill&hl=zh-CN&oe=UTF-8", {
        method: 'POST', body: JSON.stringify({"options": "enable_pre_space", "requests": [{"writing_guide": {"writing_area_width": 400, "writing_area_height": 350}, "ink": strokes}]})
    }).then(r => r.json()).then(data => {
        const results = data[1][0][1];
        if(results.includes(target)) { 
            status.innerText = "Correct! Match: " + target; 
            status.classList.add('text-green-500'); 
        } else { 
            status.innerText = `Try again. Best guess: ${results[0]}`; 
            status.classList.add('text-red-500'); 
        }
    });
}

function renderList() {
    const list = document.getElementById('wordList');
    list.innerHTML = '';
    wordSet.forEach((v, i) => {
        const item = document.createElement('div');
        item.className = `p-3 flex justify-between rounded-xl text-[10px] font-bold uppercase cursor-pointer ${v.status === 'mastered' ? 'bg-green-900/20' : v.status === 'review' ? 'bg-red-900/20' : 'bg-zinc-900'}`;
        if(i === index) item.style.border = "1px solid #fff";
        item.innerHTML = `<span>${v.h}</span> <span class="text-zinc-500">${v.p}</span>`;
        item.onclick = () => { index = i; updateUI(); };
        list.appendChild(item);
    });
}

init();
</script>
