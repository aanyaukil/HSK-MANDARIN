<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Ultimate Study Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .glass-panel { background: #0a0a0a; border: 1px solid #222; border-radius: 2rem; }
        .flip-card { perspective: 1000px; height: 350px; width: 100%; }
        .flip-inner { transition: 0.6s; transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; position: relative; }
        .flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 1px solid #333;
        }
        .back { transform: rotateY(180deg); flex-direction: column; background: #151515; }
        .btn-ui { 
            background: #fff; color: #000; height: 50px; border-radius: 1rem;
            font-weight: 800; text-transform: uppercase; font-size: 0.7rem;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-ui:active { transform: scale(0.96); }
        .btn-secondary { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-accent { background: #fbbf24; color: #000; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 100; padding: 20px; display: flex; flex-direction: column; }
        .split-view { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 400px; }
        canvas { background: #0a0a0a; border: 2px solid #333; border-radius: 1.5rem; touch-action: none; width: 100%; height: 100%; cursor: crosshair; }
        .char-ref { background: #111; border: 2px solid #222; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 10rem; color: #333; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Fix for scrollable list under flashcard */
        #wordList { height: 250px; overflow-y: auto; scrollbar-width: none; }
        .active-filter { border: 2px solid #fbbf24 !important; color: #fbbf24 !important; }
    </style>
</head>
<body>

<div id="lobbyScreen" class="p-8 min-h-screen">
    <div class="max-w-md mx-auto">
        <h1 class="text-4xl font-black mb-2 tracking-tighter">STUDY HUB</h1>
        <p class="text-zinc-500 mb-8 text-sm">Select a vocabulary pack to begin.</p>
        <div class="grid gap-4">
            <div onclick="startSet('hsk1')" class="glass-panel p-6 cursor-pointer hover:border-zinc-500 transition-all">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-bold">HSK 1 (3.0)</h3>
                        <p class="text-xs text-zinc-500 uppercase font-black mt-1">500 Words • Beginner</p>
                    </div>
                    <div class="text-2xl">→</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="appScreen" class="hidden min-h-screen flex flex-col p-6 max-w-md mx-auto">
    <div class="flex justify-between items-center mb-4">
        <button onclick="goHome()" class="text-xs font-black text-zinc-500 uppercase">← All Sets</button>
        <div class="flex items-center gap-2">
            <div id="counter" class="text-[10px] font-bold bg-zinc-900 px-3 py-1 rounded-full text-zinc-400">0 / 0</div>
            <div id="percent" class="text-[10px] font-bold text-zinc-500">0%</div>
        </div>
    </div>

    <div class="flex gap-2 mb-6">
        <button id="filterAll" onclick="setFilter('all')" class="flex-1 py-2 text-[10px] font-black uppercase border border-zinc-800 rounded-lg active-filter">All Words</button>
        <button id="filterReview" onclick="setFilter('review')" class="flex-1 py-2 text-[10px] font-black uppercase border border-zinc-800 rounded-lg">Unknown Words</button>
    </div>

    <div class="w-full h-1 bg-zinc-900 rounded-full mb-8 overflow-hidden">
        <div id="progressBar" class="h-full bg-white w-0 transition-all"></div>
    </div>

    <div class="flex items-center gap-4 mb-8">
        <button onclick="prev()" class="w-12 h-12 rounded-full border border-zinc-800 flex items-center justify-center">←</button>
        <div class="flip-card">
            <div id="card" class="flip-inner" onclick="flip()">
                <div class="front text-8xl font-black" id="h-main"></div>
                <div class="back p-8 text-center">
                    <div id="p-main" class="text-3xl font-black mb-2"></div>
                    <div id="e-main" class="text-zinc-500 italic"></div>
                </div>
            </div>
        </div>
        <button onclick="next()" class="w-12 h-12 rounded-full border border-zinc-800 flex items-center justify-center">→</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <button onclick="mark('mastered')" class="btn-ui">Mastered</button>
        <button onclick="mark('review')" class="btn-ui btn-secondary">Review (Unknown)</button>
        <button onclick="openInfo()" class="btn-ui btn-secondary">Information</button>
        <button onclick="openDraw()" class="btn-ui btn-secondary">Practice</button>
        <button id="scrambleBtn" onclick="toggleScramble()" class="btn-ui btn-secondary col-span-2">Scramble Deck</button>
    </div>

    <div id="wordList" class="no-scrollbar border-t border-zinc-900 pt-4 space-y-2"></div>
</div>

<div id="infoModal" class="modal hidden">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-sm font-black text-zinc-500 uppercase tracking-widest">Word Information</h2>
        <button onclick="closeModals()" class="text-3xl">&times;</button>
    </div>
    <div id="infoContainer" class="space-y-4 overflow-y-auto pb-10"></div>
    <button onclick="closeModals()" class="btn-ui w-full mt-auto">Return</button>
</div>

<div id="drawModal" class="modal hidden">
    <div class="flex justify-between items-center mb-6">
        <h2 id="drawHeader" class="font-black uppercase text-sm">Practice Writing</h2>
        <button onclick="closeModals()" class="text-3xl">&times;</button>
    </div>
    <div class="split-view">
        <div class="char-ref" id="charRefDisplay"></div>
        <canvas id="canvas"></canvas>
    </div>
    <div class="flex gap-4 mt-8">
        <button onclick="clearCanvas()" class="btn-ui btn-secondary flex-1">Clear</button>
        <button onclick="closeModals()" class="btn-ui flex-1">Done</button>
    </div>
</div>

<div id="endModal" class="modal hidden items-center justify-center text-center">
    <h1 class="text-5xl font-black mb-4">FINISH</h1>
    <p class="text-zinc-500 mb-10 max-w-xs">You've reached the end of this selection.</p>
    <div class="w-full space-y-3">
        <button onclick="setFilter('review')" class="btn-ui w-full btn-accent">Study Unknown Words</button>
        <button onclick="location.reload()" class="btn-ui w-full btn-secondary">Restart All</button>
        <button onclick="goHome()" class="btn-ui w-full btn-secondary">Back to Hub</button>
    </div>
</div>

let fullSet = [];
let currentFilter = 'all'; 
let currentDeck = [];
let index = 0;
let isScrambled = false;

function startSet(setId) {
    const progress = JSON.parse(localStorage.getItem('hsk_progress')) || {};
    fullSet = hsk1Data.map(v => ({
        h: v[0], p: v[1], e: v[2], status: progress[v[0]] || 'normal'
    }));
    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    setFilter('all');
}

function goHome() {
    document.getElementById('appScreen').classList.add('hidden');
    document.getElementById('lobbyScreen').classList.remove('hidden');
}

function setFilter(type) {
    currentFilter = type;
    document.getElementById('filterAll').classList.toggle('active-filter', type === 'all');
    document.getElementById('filterReview').classList.toggle('active-filter', type === 'review');
    
    if(type === 'all') currentDeck = [...fullSet];
    else currentDeck = fullSet.filter(v => v.status === 'review');
    
    if(currentDeck.length === 0 && type === 'review') {
        alert("No unknown words yet! Mark some for Review first.");
        return setFilter('all');
    }

    index = 0;
    if(isScrambled) shuffleDeck();
    updateUI();
}

function updateUI() {
    if(!currentDeck[index]) return;
    const w = currentDeck[index];
    document.getElementById('h-main').innerText = w.h;
    document.getElementById('p-main').innerText = w.p;
    document.getElementById('e-main').innerText = w.e;
    document.getElementById('counter').innerText = `${index + 1} / ${currentDeck.length}`;
    const percent = Math.round((index + 1) / currentDeck.length * 100);
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('percent').innerText = percent + '%';
    document.getElementById('card').classList.remove('flipped');
    renderList();
}

function toggleScramble() {
    isScrambled = !isScrambled;
    const btn = document.getElementById('scrambleBtn');
    if(isScrambled) {
        btn.classList.add('btn-accent');
        btn.innerText = "Unscramble Deck";
        shuffleDeck();
    } else {
        btn.classList.remove('btn-accent');
        btn.innerText = "Scramble Deck";
        setFilter(currentFilter); 
    }
    updateUI();
}

function shuffleDeck() {
    for (let i = currentDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
    }
}

function next() {
    if(index < currentDeck.length - 1) { index++; updateUI(); }
    else { document.getElementById('endModal').classList.remove('hidden'); }
}

function prev() { if(index > 0) { index--; updateUI(); } }
function flip() {
    const card = document.getElementById('card');
    card.classList.toggle('flipped');
}
    
function mark(s) {
    const word = currentDeck[index];
    word.status = s;
    const masterIdx = fullSet.findIndex(f => f.h === word.h);
    fullSet[masterIdx].status = s;
    const progress = JSON.parse(localStorage.getItem('hsk_progress')) || {};
    progress[word.h] = s;
    localStorage.setItem('hsk_progress', JSON.stringify(progress));
    next();
}

function openInfo() {
    const word = currentDeck[index].h;
    const container = document.getElementById('infoContainer');
    container.innerHTML = '';

    const chars = word.replace(/[｜\s\/]/g, '').split('');

    chars.forEach(char => {

        const data = extraData[char];

        if (!data) return;

        // ⭐ Frequency display
        const stars = "★★★★★".slice(0, data.freqScore);

        // meanings → sentences
        const meaningsHTML = data.meanings.map(m => `
            <div class="mt-3">
                <div class="text-xs text-zinc-400 italic">${m.meaning}</div>
                <div>${m.sentence.h}</div>
                <div class="text-xs text-zinc-400">${m.sentence.p}</div>
                <div class="text-xs text-zinc-500 italic">${m.sentence.e}</div>
            </div>
        `).join('');

        const card = document.createElement('div');
        card.className = "glass-panel p-6";

        card.innerHTML = `
            <div class="flex items-center gap-6 mb-4">
                <div class="text-6xl font-black">${char}</div>
                <div>
                    <div class="text-xs text-zinc-500 uppercase">Radical</div>
                    <div class="text-lg font-bold">${data.radical.char} (${data.radical.pinyin})</div>
                    <div class="text-xs text-zinc-400">${data.radical.meaning}</div>
                </div>
            </div>

            <div class="mt-4">
                <div class="text-xs text-zinc-500 uppercase">Frequency</div>
                <div>${stars} <span class="text-xs text-zinc-400 ml-2">${data.frequency}</span></div>
            </div>

            <div class="mt-4">
                <div class="text-xs text-zinc-500 uppercase">Usage</div>
                ${meaningsHTML}
            </div>

            <div class="mt-4">
                <div class="text-xs text-zinc-500 uppercase">Etymology</div>
                <div class="text-xs text-zinc-300">${data.etymology}</div>
            </div>

            <div class="mt-4">
                <div class="text-xs text-zinc-500 uppercase">Traditional</div>
                <div>${data.traditional}</div>
            </div>
        `;

        container.appendChild(card);
    });

    document.getElementById('infoModal').classList.remove('hidden');
}

function openDraw() {
    const char = currentDeck[index].h[0];
    document.getElementById('charRefDisplay').innerText = char;
    document.getElementById('drawHeader').innerText = "Draw: " + char;
    document.getElementById('drawModal').classList.remove('hidden');
    resizeCanvas();
    clearCanvas();
}

function renderList() {
    const list = document.getElementById('wordList');
    list.innerHTML = '';
    currentDeck.forEach((v, i) => {
        const item = document.createElement('div');
        item.className = `p-3 flex justify-between rounded-xl text-[10px] font-bold uppercase cursor-pointer ${v.status === 'mastered' ? 'bg-green-900/10 text-green-500' : v.status === 'review' ? 'bg-red-900/20 text-red-500' : 'bg-zinc-900 text-zinc-400'}`;
        if(i === index) item.style.border = "1px solid #fff";
        item.innerHTML = `<span>${v.h}</span> <span>${v.p}</span>`;
        item.onclick = () => { index = i; updateUI(); };
        list.appendChild(item);
    });
}

function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing = false;

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
}

// Improved position tracking for exact alignment
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // Account for both the element position and any window scrolling
    return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
    };
}

function startD(e) {
    drawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

function drawD(e) {
    if (!drawing) return;
    const pos = getPos(e);
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#fff';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}

canvas.addEventListener('mousedown', startD);
canvas.addEventListener('mousemove', drawD);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startD(e); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawD(e); }, {passive: false});
window.addEventListener('mouseup', () => drawing = false);
window.addEventListener('touchend', () => drawing = false);

function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
</script>
