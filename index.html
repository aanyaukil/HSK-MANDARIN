<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK App</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background-color: #ffe4ec; }

/* Card */
.flip-card { perspective: 1000px; }
.flip-inner { transition: transform 0.6s; transform-style: preserve-3d; }
.flipped { transform: rotateY(180deg); }

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
}
.back { transform: rotateY(180deg); }

/* Buttons */
.btn {
    padding: 10px 16px;
    border-radius: 999px;
    font-weight: 600;
    transition: all 0.2s;
}
.btn:active { transform: scale(0.95); }

canvas {
    border: 2px solid black;
    border-radius: 10px;
    touch-action: none;
}
</style>
</head>

<body class="p-6 text-center">

<!-- HOME -->
<div id="home">
<h1 class="text-3xl font-bold mb-6">My Flashcards</h1>

<div onclick="openSet()" class="bg-white p-6 rounded-2xl shadow cursor-pointer hover:scale-105 transition">
HSK 1
</div>
</div>

<!-- FLASHCARDS -->
<div id="flashPage" class="hidden">

<button onclick="goHome()" class="btn bg-white mb-4">← Back</button>

<select onchange="filterMode=this.value; resetSet();" class="mb-4 p-2 rounded-xl">
<option value="all">All</option>
<option value="unknown">Unknown Only</option>
</select>

<div class="flip-card w-80 h-60 mx-auto relative" onclick="flipCard()">
<div id="card" class="flip-inner w-full h-full relative">

<div class="front bg-white rounded-2xl flex items-center justify-center text-5xl">
<span id="hanzi"></span>
</div>

<div class="back bg-pink-200 rounded-2xl flex flex-col justify-center items-center">
<p id="pinyin" class="text-lg"></p>
<p id="english" class="italic"></p>
</div>

</div>
</div>

<div class="flex flex-wrap justify-center gap-2 mt-4">

<button onclick="prevCard()" class="btn bg-white">⬅️</button>

<button onclick="markKnown()" class="btn bg-green-300">Know</button>

<button onclick="markUnknown()" class="btn bg-red-300">Don't</button>

<button onclick="openInfo()" class="btn bg-blue-200">Info</button>

<button onclick="openWrite()" class="btn bg-pink-300">Write</button>

<button onclick="nextCard()" class="btn bg-white">➡️</button>

</div>

</div>

<!-- INFO -->
<div id="infoPopup" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
<div class="bg-white p-6 rounded-2xl w-80 text-left">

<h2 class="font-bold mb-2">Word Info</h2>

<p><b>Pinyin:</b> <span id="infoPinyin"></span></p>
<p><b>Meaning:</b> <span id="infoEnglish"></span></p>
<p><b>Radical:</b> <span id="infoRadical"></span></p>
<p><b>Radical Pinyin:</b> <span id="infoRadicalPinyin"></span></p>
<p><b>Radical Meaning:</b> <span id="infoRadicalMeaning"></span></p>

<img id="infoStroke" class="mx-auto my-3 w-32">

<button onclick="closeInfo()" class="btn bg-pink-300 w-full">Close</button>

</div>
</div>

<!-- WRITE -->
<div id="writePopup" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
<div class="bg-white p-6 rounded-2xl w-80">

<img id="stroke" class="mx-auto mb-3 w-32">

<canvas id="canvas" width="250" height="250"></canvas>

<div class="flex justify-between mt-3">
<button onclick="clearCanvas()" class="btn bg-gray-200">Clear</button>
<button onclick="closeWrite()" class="btn bg-pink-300">Done</button>
</div>

</div>
</div>

<!-- END -->
<div id="endScreen" class="hidden">
<h2 class="text-2xl font-bold">Well done 🎉</h2>
<p>You finished the set!</p>

<button onclick="goHome()" class="btn bg-pink-300 mt-4">Back to Home</button>
</div>

<script>

// ===== RADICAL DATA =====
let radicals = {
"女": {p:"nǚ", m:"woman"},
"口": {p:"kǒu", m:"mouth"},
"木": {p:"mù", m:"tree"},
"人": {p:"rén", m:"person"}
};

// ===== VOCAB =====
let vocab = [
{h:"好", p:"hǎo", e:"good", r:"女", known:false},
{h:"吃", p:"chī", e:"eat", r:"口", known:false},
{h:"喝", p:"hē", e:"drink", r:"口", known:false},
{h:"林", p:"lín", e:"forest", r:"木", known:false}
];

let index = 0;
let filterMode = "all";

// ===== FILTER =====
function getFiltered(){
    return (filterMode==="unknown")
        ? vocab.filter(v=>!v.known)
        : vocab;
}

// ===== SHOW CARD =====
function showCard(){

    let list = getFiltered();

    if(index >= list.length){
        document.getElementById("flashPage").classList.add("hidden");
        document.getElementById("endScreen").classList.remove("hidden");
        return;
    }

    let w = list[index];

    document.getElementById("card").classList.remove("flipped");

    document.getElementById("hanzi").innerText = w.h;
    document.getElementById("pinyin").innerText = w.p;
    document.getElementById("english").innerText = w.e;

    document.getElementById("stroke").src =
    `https://cdn.jsdelivr.net/gh/skishore/makemeahanzi@master/graphics/${w.h.charCodeAt(0)}.gif`;
}

// ===== NAV =====
function nextCard(){ index++; showCard(); }
function prevCard(){ if(index>0) index--; showCard(); }

function resetSet(){
    index = 0;
    showCard();
}

// ===== MARK =====
function markKnown(){
    let list = getFiltered();
    let word = list[index];
    word.known = true;
    nextCard();
}

function markUnknown(){
    let list = getFiltered();
    let word = list[index];
    word.known = false;
    nextCard();
}

// ===== INFO =====
function openInfo(){
    let w = getFiltered()[index];
    let r = radicals[w.r] || {p:"?", m:"unknown"};

    document.getElementById("infoPinyin").innerText = w.p;
    document.getElementById("infoEnglish").innerText = w.e;
    document.getElementById("infoRadical").innerText = w.r;
    document.getElementById("infoRadicalPinyin").innerText = r.p;
    document.getElementById("infoRadicalMeaning").innerText = r.m;

    document.getElementById("infoStroke").src =
    `https://cdn.jsdelivr.net/gh/skishore/makemeahanzi@master/graphics/${w.h.charCodeAt(0)}.gif`;

    document.getElementById("infoPopup").classList.remove("hidden");
}

function closeInfo(){
    document.getElementById("infoPopup").classList.add("hidden");
}

// ===== WRITE =====
function openWrite(){
    document.getElementById("writePopup").classList.remove("hidden");
}

function closeWrite(){
    document.getElementById("writePopup").classList.add("hidden");
}

// ===== FLIP =====
function flipCard(){
    document.getElementById("card").classList.toggle("flipped");
}

document.addEventListener("keydown", e=>{
    if(e.code==="Space") flipCard();
});

// ===== CANVAS =====
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",()=>drawing=true);
canvas.addEventListener("touchend",()=>drawing=false);
canvas.addEventListener("touchmove",draw);

function draw(e){
    if(!drawing)return;
    let rect=canvas.getBoundingClientRect();
    let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

    ctx.lineWidth=4;
    ctx.lineCap="round";
    ctx.lineTo(x,y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x,y);
}

function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ===== INIT =====
function openSet(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("flashPage").classList.remove("hidden");
    resetSet();
}

function goHome(){
    location.reload();
}

</script>

</body>
</html>
