<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK Master App</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
canvas {
    border: 2px solid white;
    border-radius: 10px;
    touch-action: none;
}
</style>
</head>

<body class="bg-slate-900 text-white p-4">

<h1 class="text-2xl font-bold text-blue-400 text-center mb-4">
HSK Vocabulary Trainer
</h1>

<div id="wordList"></div>

<!-- DETAIL VIEW -->
<div id="detailView" class="hidden mt-6">

<button onclick="goBack()" class="bg-gray-700 px-3 py-2 rounded mb-4">← Back</button>

<div class="text-center">
    <p id="pinyin" class="text-xl text-blue-300"></p>
    <p id="hanzi" class="text-6xl font-bold"></p>
    <p id="english" class="italic"></p>
</div>

<img id="strokeImg" class="mx-auto my-4 w-40">

<canvas id="canvas" width="300" height="300"></canvas>

<div class="flex justify-center gap-4 mt-4">
    <button onclick="markKnown()" class="bg-green-500 px-4 py-2 rounded">Known</button>
    <button onclick="markUnknown()" class="bg-red-500 px-4 py-2 rounded">Unknown</button>
    <button onclick="clearCanvas()" class="bg-gray-600 px-4 py-2 rounded">Clear</button>
</div>

</div>

<script>

// ===== VOCAB (SAMPLE — I CAN EXPAND ALL 500) =====
let vocab = [
{h:"爱", p:"ài", e:"love", known:false},
{h:"爱好", p:"ài hào", e:"hobby", known:false},
{h:"八", p:"bā", e:"eight", known:false},
{h:"爸爸", p:"bàba", e:"dad", known:false},
{h:"吧", p:"ba", e:"particle", known:false},
{h:"白", p:"bái", e:"white", known:false},
{h:"白天", p:"bái tiān", e:"daytime", known:false},
{h:"百", p:"bǎi", e:"hundred", known:false},
{h:"班", p:"bān", e:"class", known:false},
{h:"半", p:"bàn", e:"half", known:false},
{h:"帮", p:"bāng", e:"help", known:false},
{h:"杯子", p:"bēi zi", e:"cup", known:false},
{h:"北京", p:"běi jīng", e:"Beijing", known:false},
{h:"不", p:"bù", e:"no", known:false},
{h:"吃", p:"chī", e:"eat", known:false},
{h:"喝", p:"hē", e:"drink", known:false},
{h:"老师", p:"lǎoshī", e:"teacher", known:false},
{h:"学生", p:"xuésheng", e:"student", known:false},
{h:"中国", p:"zhōngguó", e:"China", known:false},
{h:"谢谢", p:"xièxie", e:"thank you", known:false}
];

// ===== STATE =====
let currentIndex = null;

// ===== SHOW LIST =====
function showWords() {
    document.getElementById("detailView").classList.add("hidden");

    vocab.sort((a,b)=>a.known - b.known);

    let html = "";
    vocab.forEach((w,i)=>{
        html += `
        <div onclick="openWord(${i})"
        class="bg-white text-black p-4 rounded mb-2 flex justify-between">
            <span>${w.h}</span>
            <span>${w.known ? "✅" : "❌"}</span>
        </div>`;
    });

    document.getElementById("wordList").innerHTML = html;
}

// ===== OPEN WORD =====
function openWord(i) {
    currentIndex = i;
    let w = vocab[i];

    document.getElementById("hanzi").innerText = w.h;
    document.getElementById("pinyin").innerText = w.p;
    document.getElementById("english").innerText = w.e;

    document.getElementById("strokeImg").src =
    `https://cdn.jsdelivr.net/gh/skishore/makemeahanzi@master/graphics/${w.h.charCodeAt(0)}.gif`;

    document.getElementById("detailView").classList.remove("hidden");
}

// ===== NAV =====
function goBack() {
    showWords();
}

// ===== MARK =====
function markKnown() {
    vocab[currentIndex].known = true;
    showWords();
}

function markUnknown() {
    vocab[currentIndex].known = false;
    showWords();
}

// ===== DRAW =====
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("touchstart", ()=>drawing=true);
canvas.addEventListener("touchend", ()=>drawing=false);
canvas.addEventListener("touchmove", draw);

function draw(e) {
    if (!drawing) return;

    let rect = canvas.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left;
    let y = e.touches[0].clientY - rect.top;

    ctx.lineWidth = 4;
    ctx.strokeStyle = "white";

    ctx.lineTo(x,y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x,y);
}

function clearCanvas() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ===== INIT =====
showWords();

</script>

</body>
</html>
