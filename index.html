<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Ultimate 500</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f7ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .flip-card { perspective: 1000px; }
        .flip-inner { transition: 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .back { transform: rotateY(180deg); background-color: #eff6ff; flex-direction: column; }
        .btn-blue {
            background-color: #3b82f6; color: white; transition: all 0.2s;
            padding: 10px; border-radius: 12px; font-weight: 600;
        }
        .btn-blue:hover { background-color: #2563eb; transform: translateY(-1px); }
        .btn-nav { background: white; border: 2px solid #3b82f6; color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .word-list-item { transition: 0.2s; cursor: pointer; border-left: 4px solid transparent; }
        .status-mastered { border-left-color: #10b981; background: #f0fdf4; }
        .status-review { border-left-color: #ef4444; background: #fef2f2; }
        canvas { border: 2px solid #3b82f6; border-radius: 15px; background: white; touch-action: none; width: 100%; height: 280px; }
        .progress-fill { transition: width 0.4s ease-in-out; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-20">

    <div id="home">
        <h1 class="text-3xl font-black text-blue-900 mt-12 text-center tracking-tight">HSK 3.0 MASTER</h1>
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-blue-50 mt-10">
            <div class="text-center mb-6">
                <span class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-bold">LEVEL 1</span>
                <h2 class="text-2xl font-bold text-slate-800 mt-2">500 Core Words</h2>
            </div>
            <div class="space-y-4">
                <button onclick="startSet('all')" class="w-full btn-blue text-lg py-4">Start Study Set</button>
                <div id="stats" class="text-center text-sm text-slate-500 font-medium pt-2">Progress: 0 / 500 Mastered</div>
            </div>
        </div>
    </div>

    <div id="flashPage" class="hidden">
        <div class="mb-6">
            <div class="flex justify-between items-end mb-1">
                <button onclick="goHome()" class="text-blue-600 font-bold text-sm">← Exit</button>
                <span id="progressPercent" class="text-xs font-black text-blue-500 uppercase">0% Complete</span>
            </div>
            <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="progress-fill h-full bg-blue-500 w-0"></div>
            </div>
        </div>

        <div class="flex items-center justify-between mb-4">
            <span id="counter" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Card 1 / 500</span>
            <button onclick="shuffleVocab()" class="text-xs font-bold bg-slate-100 px-3 py-1 rounded-lg text-slate-600 hover:bg-blue-100 hover:text-blue-600">🎲 Scramble Set</button>
        </div>

        <div class="flex items-center gap-3 mb-8">
            <button onclick="prevCard()" class="btn-nav">←</button>
            <div class="flip-card flex-1 h-72">
                <div id="card" class="flip-inner w-full h-full relative" onclick="flipCard()">
                    <div class="front bg-white text-7xl font-bold text-slate-800" id="hanzi"></div>
                    <div class="back p-6 text-center">
                        <p id="pinyin" class="text-2xl text-blue-600 font-bold mb-2"></p>
                        <p id="english" class="text-lg text-slate-600 leading-tight"></p>
                    </div>
                </div>
            </div>
            <button onclick="nextCard()" class="btn-nav">→</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="mark('mastered')" class="btn-blue bg-emerald-500 hover:bg-emerald-600 shadow-lg shadow-emerald-100">Got it!</button>
            <button onclick="mark('review')" class="btn-blue bg-rose-500 hover:bg-rose-600 shadow-lg shadow-rose-100">Don't Know</button>
            <button onclick="openWrite()" class="btn-blue !bg-white !text-blue-500 border-2 border-blue-500">Practice Draw</button>
            <button onclick="openInfo()" class="btn-blue !bg-white !text-indigo-500 border-2 border-indigo-500">Radical Info</button>
        </div>

        <h3 class="font-black text-slate-800 mb-4 text-sm uppercase tracking-widest">Mastery List</h3>
        <div id="wordList" class="space-y-2"></div>
    </div>

    <div id="endModal" class="hidden fixed inset-0 bg-slate-900/90 z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full text-center">
            <h2 class="text-3xl font-black mb-2">Set Complete!</h2>
            <p class="text-slate-500 mb-6">What would you like to do next?</p>
            <div class="space-y-3">
                <button onclick="location.reload()" class="w-full btn-blue">Restart Entire Set</button>
                <button onclick="closeEndModal()" class="w-full btn-blue !bg-slate-200 !text-slate-700">Back to Last Card</button>
            </div>
        </div>
    </div>

    <div id="writePopup" class="hidden fixed inset-0 bg-white z-[110] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Practice: <span id="targetChar" class="text-blue-600"></span></h2>
            <button onclick="closeWrite()" class="text-3xl">&times;</button>
        </div>
        <canvas id="canvas"></canvas>
        <div id="drawFeedback" class="mt-4 text-center font-bold h-6"></div>
        <div class="grid grid-cols-2 gap-4 mt-auto">
            <button onclick="clearCanvas()" class="btn-blue !bg-slate-100 !text-slate-600">Clear</button>
            <button onclick="checkDrawing()" class="btn-blue">Verify</button>
        </div>
    </div>

        let vocab = [];
        let index = 0;
        let currentStrokes = [];

        function init() {
            const saved = JSON.parse(localStorage.getItem('hsk_500_mastery')) || {};
            vocab = rawData.map((item, i) => ({
                id: i, h: item[0], p: item[1], e: item[2], status: saved[item[0]] || 'normal'
            }));
            updateStats();
        }

        function save() {
            const progress = {};
            vocab.forEach(v => { if(v.status !== 'normal') progress[v.h] = v.status; });
            localStorage.setItem('hsk_500_mastery', JSON.stringify(progress));
            updateStats();
        }

        function updateStats() {
            const masteredCount = vocab.filter(v => v.status === 'mastered').length;
            const percent = Math.round((masteredCount / vocab.length) * 100);
            document.getElementById('stats').innerText = `Progress: ${masteredCount} / 500 Mastered`;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').innerText = percent + '% Complete';
        }

        function showCard() {
            if (index >= vocab.length) {
                document.getElementById('endModal').classList.remove('hidden');
                index = vocab.length - 1;
                return;
            }
            if (index < 0) index = 0;

            const w = vocab[index];
            document.getElementById('hanzi').innerText = w.h;
            document.getElementById('pinyin').innerText = w.p;
            document.getElementById('english').innerText = w.e;
            document.getElementById('counter').innerText = `Card ${index + 1} / ${vocab.length}`;
            document.getElementById('card').classList.remove('flipped');
            document.getElementById('targetChar').innerText = w.h[0];
            renderWordList();
        }

        function mark(status) {
            vocab[index].status = status;
            save();
            nextCard();
        }

        function shuffleVocab() {
            for (let i = vocab.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [vocab[i], vocab[j]] = [vocab[j], vocab[i]];
            }
            index = 0;
            showCard();
        }

        function renderWordList() {
            const container = document.getElementById('wordList');
            container.innerHTML = '';
            // Only show neighboring 10 words for performance
            const start = Math.max(0, index - 5);
            const end = Math.min(vocab.length, index + 15);
            
            for(let i=start; i<end; i++) {
                const w = vocab[i];
                const div = document.createElement('div');
                div.className = `word-list-item p-3 bg-white rounded-xl shadow-sm text-sm flex justify-between items-center ${w.status === 'mastered' ? 'status-mastered' : (w.status === 'review' ? 'status-review' : '')} ${i === index ? 'ring-2 ring-blue-500' : ''}`;
                div.innerHTML = `<div><span class="font-bold">${w.h}</span> <span class="text-slate-400 ml-2">${w.p}</span></div>`;
                div.onclick = () => { index = i; showCard(); };
                container.appendChild(div);
            }
        }

        // NAVIGATION
        function nextCard() { index++; showCard(); }
        function prevCard() { index--; showCard(); }
        function startSet() { document.getElementById('home').classList.add('hidden'); document.getElementById('flashPage').classList.remove('hidden'); showCard(); }
        function goHome() { location.reload(); }
        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
        function closeEndModal() { document.getElementById('endModal').classList.add('hidden'); }

        // DRAWING LOGIC
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function openWrite() { document.getElementById('writePopup').classList.remove('hidden'); clearCanvas(); }
        function closeWrite() { document.getElementById('writePopup').classList.add('hidden'); }
        
        canvas.width = 400; canvas.height = 280;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); currentStrokes.push([[p.x],[p.y],[Date.now()]]); });
        canvas.addEventListener('mousemove', (e) => { 
            if(!drawing) return; 
            const p = getPos(e); 
            ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle='#3b82f6'; 
            ctx.lineTo(p.x, p.y); ctx.stroke();
            const s = currentStrokes[currentStrokes.length-1];
            s[0].push(p.x); s[1].push(p.y); s[2].push(Date.now());
        });
        window.addEventListener('mouseup', () => drawing = false);
        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); currentStrokes = []; document.getElementById('drawFeedback').innerText = ""; }

        function checkDrawing() {
            const target = document.getElementById('targetChar').innerText;
            const fb = document.getElementById('drawFeedback');
            fb.innerText = "Checking...";
            fetch("https://www.google.com.tw/inputtools/request?ime=handwriting&app=autofill&hl=zh-CN&oe=UTF-8", {
                method: 'POST',
                body: JSON.stringify({"options": "enable_pre_space", "requests": [{"writing_guide": {"writing_area_width": canvas.width, "writing_area_height": canvas.height}, "ink": currentStrokes}]})
            }).then(r => r.json()).then(data => {
                const res = data[1][0][1];
                if(res.includes(target)) { fb.className = "text-emerald-500 font-bold"; fb.innerText = "Correct! Match Found."; }
                else { fb.className = "text-rose-500 font-bold"; fb.innerText = `Incorrect. Looks like: ${res[0]}`; }
            }).catch(() => fb.innerText = "Check Unavailable Offline");
        }

        init();
    </script>
