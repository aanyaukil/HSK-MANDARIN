<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 1 Master - 500 Words</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f7ff; font-family: 'Segoe UI', sans-serif; }
        .flip-card { perspective: 1000px; }
        .flip-inner { transition: 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .back { transform: rotateY(180deg); background-color: #e0f2fe; flex-direction: column; }
        .btn-blue {
            background-color: #3b82f6; color: white; transition: all 0.2s;
            padding: 12px; border-radius: 12px; font-weight: 600; width: 100%;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }
        .btn-blue:hover { background-color: #2563eb; transform: translateY(-1px); }
        .btn-nav { background: white; border: 2px solid #3b82f6; color: #3b82f6; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .word-list-item { transition: all 0.2s; cursor: pointer; }
        .known-status { border-left: 5px solid #10b981; background: #f0fdf4; }
        .unknown-status { border-left: 5px solid #ef4444; background: #fef2f2; }
        canvas { border: 2px solid #3b82f6; border-radius: 15px; background: white; touch-action: none; width: 100%; height: 300px; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div id="home">
        <h1 class="text-3xl font-extrabold text-blue-900 mb-2 mt-8 text-center">HSK 1 Master</h1>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 mt-10 text-center">
            <h2 class="text-xl font-bold text-blue-800">Complete Set (500 Words)</h2>
            <p id="stats-text" class="text-slate-500 mb-4">0/500 Mastered</p>
            <div class="space-y-3">
                <button onclick="startSet(false)" class="btn-blue">Start Sequence</button>
                <button onclick="startSet(true)" class="btn-blue !bg-indigo-500">Scramble & Start</button>
            </div>
        </div>
    </div>

    <div id="flashPage" class="hidden">
        <div class="flex items-center justify-between mb-4">
            <button onclick="goHome()" class="text-blue-600 font-bold">← Home</button>
            <span id="counter" class="text-blue-900 font-medium text-sm">1 / 500</span>
            <select id="filterSelect" onchange="filterMode=this.value; index=0; showCard();" class="bg-white border border-blue-200 rounded-lg p-1 text-xs">
                <option value="all">All Words</option>
                <option value="unknown">Review "Don't Know"</option>
            </select>
        </div>

        <div class="flex items-center gap-2 mb-6">
            <button onclick="prevCard()" class="btn-nav">←</button>
            <div class="flip-card flex-1 h-64">
                <div id="card" class="flip-inner w-full h-full relative" onclick="flipCard()">
                    <div class="front bg-white text-6xl" id="hanzi"></div>
                    <div class="back p-4">
                        <p id="pinyin" class="text-2xl text-blue-600 font-bold"></p>
                        <p id="english" class="text-lg text-slate-700 text-center mt-2"></p>
                    </div>
                </div>
            </div>
            <button onclick="nextCard()" class="btn-nav">→</button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-8">
            <button onclick="mark(true)" class="btn-blue bg-emerald-500">I Know This</button>
            <button onclick="mark(false)" class="btn-blue !bg-red-500">Don't Know</button>
            <button onclick="openWrite()" class="btn-blue !bg-sky-500">Draw & Check</button>
            <button onclick="openInfo()" class="btn-blue !bg-indigo-500">Radical Info</button>
        </div>

        <h3 class="font-bold text-blue-900 mb-4">Progress List</h3>
        <div id="wordList" class="space-y-2 pb-10"></div>
    </div>

    <div id="writePopup" class="hidden fixed inset-0 bg-white z-50 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Draw: <span id="targetChar" class="text-blue-600"></span></h2>
            <button onclick="closeWrite()" class="text-2xl">&times;</button>
        </div>
        <canvas id="canvas"></canvas>
        <div id="recognitionResult" class="mt-2 text-center font-bold h-6"></div>
        <div class="grid grid-cols-2 gap-4 mt-4">
            <button onclick="clearCanvas()" class="btn-blue !bg-slate-400">Clear</button>
            <button onclick="checkDrawing()" class="btn-blue !bg-emerald-500">Check Accuracy</button>
        </div>
    </div>

    <div id="infoPopup" class="hidden fixed inset-0 bg-white z-50 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">Word Info</h2><button onclick="closeInfo()" class="text-2xl">&times;</button></div>
        <div id="infoContent" class="space-y-4"></div>
    </div>

            const saved = JSON.parse(localStorage.getItem('hsk_master_v3')) || {};
            vocab = rawData.map((item, i) => ({
                id: i, h: item[0], p: item[1], e: item[2], known: saved[item[0]] || false
            }));
            updateStats();
        }

        function save() {
            const progress = {};
            vocab.forEach(v => { progress[v.h] = v.known; });
            localStorage.setItem('hsk_master_v3', JSON.stringify(progress));
            updateStats();
        }

        function updateStats() {
            const count = vocab.filter(v => v.known).length;
            document.getElementById('stats-text').innerText = `${count} / 500 Mastered`;
        }

        function getList() {
            if (filterMode === 'all') return vocab;
            if (filterMode === 'unknown') return vocab.filter(v => !v.known);
            return vocab;
        }

        function startSet(scramble) {
            if (scramble) {
                vocab = [...vocab].sort(() => Math.random() - 0.5);
            } else {
                vocab.sort((a,b) => a.id - b.id);
            }
            document.getElementById('home').classList.add('hidden');
            document.getElementById('flashPage').classList.remove('hidden');
            index = 0;
            renderWordList();
            showCard();
        }

        function showCard() {
            const list = getList();
            if (list.length === 0) {
                document.getElementById('hanzi').innerText = "Set Empty";
                return;
            }
            if (index >= list.length) index = 0;
            const w = list[index];
            document.getElementById('hanzi').innerText = w.h;
            document.getElementById('pinyin').innerText = w.p;
            document.getElementById('english').innerText = w.e;
            document.getElementById('counter').innerText = `${index + 1} / ${list.length}`;
            document.getElementById('card').classList.remove('flipped');
            document.getElementById('targetChar').innerText = w.h[0];
        }

        function nextCard() { index++; showCard(); }
        function prevCard() { if (index > 0) index--; showCard(); }

        function mark(status) {
            const list = getList();
            if (list.length === 0) return;
            list[index].known = status;
            save();
            renderWordList();
            nextCard();
        }

        function renderWordList() {
            const container = document.getElementById('wordList');
            container.innerHTML = '';
            vocab.forEach((w, idx) => {
                if (filterMode === 'unknown' && w.known) return;
                const div = document.createElement('div');
                div.className = `word-list-item p-3 bg-white rounded-xl shadow-sm flex justify-between items-center ${w.known ? 'known-status' : 'unknown-status'}`;
                div.innerHTML = `<div><span class="font-bold">${w.h}</span> <span class="text-slate-400 text-sm ml-2">${w.p}</span></div>`;
                div.onclick = () => { index = idx; showCard(); window.scrollTo({top:0, behavior:'smooth'}); };
                container.appendChild(div);
            });
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
        function goHome() { location.reload(); }
        function openWrite() { document.getElementById('writePopup').classList.remove('hidden'); clearCanvas(); }
        function closeWrite() { document.getElementById('writePopup').classList.add('hidden'); }

        // Drawing API Logic (Lightweight implementation)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentStrokes = [];
        let currentStroke = [[], [], []];

        canvas.width = 400; canvas.height = 300;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        window.addEventListener('touchend', endDraw);

        function startDraw(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); currentStroke = [[], [], []]; }
        function draw(e) { 
            if(!drawing) return; 
            const p = getPos(e); 
            ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle='#3b82f6'; ctx.lineTo(p.x, p.y); ctx.stroke(); 
            currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(Date.now());
        }
        function endDraw() { if(drawing) currentStrokes.push(currentStroke); drawing = false; }
        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); currentStrokes = []; document.getElementById('recognitionResult').innerText = ""; }

        function checkDrawing() {
            const target = document.getElementById('targetChar').innerText;
            if (currentStrokes.length === 0) return;
            const url = "https://www.google.com.tw/inputtools/request?ime=handwriting&app=autofill&hl=zh-CN&oe=UTF-8";
            fetch(url, { method: 'POST', body: JSON.stringify({ "requests": [{ "ink": currentStrokes }] }) })
            .then(res => res.json()).then(data => {
                const candidates = data[1][0][1];
                const resDiv = document.getElementById('recognitionResult');
                if (candidates.includes(target)) {
                    resDiv.innerText = "Correct! Match Found."; resDiv.style.color = "green";
                } else {
                    resDiv.innerText = `Try again. Detected: ${candidates[0]}`; resDiv.style.color = "red";
                }
            });
        }

        init();
    </script>
</body>
</html>
