<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 1: Elite Midnight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-card { background: #111111; border: 1px solid #222222; border-radius: 2.5rem; }
        .flip-card { perspective: 1000px; height: 320px; }
        .flip-inner { transition: 0.6s; transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; }
        .flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 2rem;
            display: flex; align-items: center; justify-content: center;
            background: #111111; border: 1px solid #333333;
        }
        .back { transform: rotateY(180deg); flex-direction: column; background: #161616; }
        .action-btn { 
            height: 60px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; 
            font-size: 0.75rem; border-radius: 1.25rem; transition: all 0.2s;
        }
        .nav-arrow {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            width: 50px; height: 50px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .nav-arrow:hover { background: #ffffff; color: #000000; }
        .list-item { border-left: 3px solid transparent; background: #0a0a0a; transition: 0.2s; }
        .mastered-tag { border-left-color: #10b981 !important; }
        .review-tag { border-left-color: #f43f5e !important; }
        canvas { background: #050505; border: 2px solid #222; border-radius: 1.5rem; touch-action: none; cursor: crosshair; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto pb-24">

    <div id="home">
        <div class="mt-24 text-center">
            <h1 class="text-5xl font-black tracking-tighter mb-4 italic">HSK 500</h1>
            <p class="text-zinc-500 font-bold text-xs uppercase tracking-widest mb-12">Precision Study System</p>
        </div>
        <div class="glass-card p-8 text-center">
            <div id="stats" class="text-2xl font-black mb-8">0 / 500 MASTERED</div>
            <button onclick="startApp()" class="w-full bg-white text-black py-5 rounded-3xl font-black text-lg hover:scale-[1.02] transition">START SESSION</button>
            <button onclick="resetData()" class="mt-6 text-zinc-600 text-[10px] font-black uppercase tracking-widest">Reset Local Storage</button>
        </div>
    </div>

    <div id="study" class="hidden">
        <div class="flex justify-between items-center mb-8">
            <button onclick="location.reload()" class="text-zinc-500 font-black text-xs">EXIT</button>
            <div id="progressFill" class="h-1 bg-zinc-800 w-32 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-white w-0 transition-all duration-500"></div>
            </div>
            <span id="percLabel" class="text-zinc-500 font-black text-[10px]">0%</span>
        </div>

        <div class="flex items-center gap-4 mb-8">
            <button onclick="prevCard()" class="nav-arrow text-xl">←</button>
            
            <div class="flip-card flex-1">
                <div id="card" class="flip-inner" onclick="flipCard()">
                    <div class="front text-8xl font-black text-white" id="hanzi"></div>
                    <div class="back p-8 text-center">
                        <p id="pinyin" class="text-3xl font-black mb-2"></p>
                        <p id="english" class="text-zinc-500 font-medium"></p>
                    </div>
                </div>
            </div>

            <button onclick="nextCard()" class="nav-arrow text-xl">→</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="setStatus('mastered')" class="action-btn bg-white text-black">Mastered</button>
            <button onclick="setStatus('review')" class="action-btn bg-zinc-800 text-white">Review</button>
            <button onclick="openInfo()" class="action-btn border border-zinc-800 text-zinc-300">Information</button>
            <button onclick="openWrite()" class="action-btn border border-zinc-800 text-zinc-300">Practice</button>
        </div>

        <h3 class="text-zinc-600 text-[10px] font-black uppercase tracking-widest mb-4">Vocabulary Index</h3>
        <div id="wordList" class="space-y-2 max-h-48 overflow-y-auto no-scrollbar"></div>
    </div>

    <div id="infoModal" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col p-8 overflow-y-auto">
        <div class="flex justify-between items-start mb-10">
            <div>
                <h2 id="i-hanzi" class="text-8xl font-black"></h2>
                <p id="i-pinyin" class="text-2xl text-zinc-500 font-bold"></p>
            </div>
            <button onclick="closeInfo()" class="text-5xl text-zinc-700">&times;</button>
        </div>

        <div class="space-y-4">
            <div class="glass-card p-6 flex flex-col items-center">
                <p class="text-zinc-600 text-[10px] font-black uppercase mb-4 tracking-widest">Stroke Animation</p>
                <img id="strokeImg" src="" class="w-32 h-32 invert opacity-90">
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="bg-zinc-900/50 p-6 rounded-[2rem] border border-zinc-800">
                    <p class="text-zinc-600 text-[10px] font-black uppercase mb-2">Radical Details</p>
                    <div class="flex items-baseline gap-3">
                        <span id="i-rad" class="text-3xl font-bold text-white"></span>
                        <span id="i-radP" class="text-sm text-zinc-400 font-bold"></span>
                    </div>
                    <p id="i-radM" class="text-sm text-zinc-500 mt-1"></p>
                </div>
                <div class="bg-zinc-900/50 p-6 rounded-[2rem] border border-zinc-800">
                    <p class="text-zinc-600 text-[10px] font-black uppercase mb-2">Definition</p>
                    <p id="i-def" class="text-lg font-bold"></p>
                </div>
            </div>
        </div>
        <button onclick="closeInfo()" class="mt-12 w-full bg-white text-black py-5 rounded-3xl font-black uppercase text-sm">Dismiss</button>
    </div>

    <div id="drawModal" class="hidden fixed inset-0 bg-black z-50 p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black uppercase tracking-tighter">Writing <span id="drawTarget" class="text-zinc-500"></span></h2>
            <button onclick="closeWrite()" class="text-4xl text-zinc-700">&times;</button>
        </div>
        <canvas id="canvas" class="w-full aspect-square"></canvas>
        <div id="drawResult" class="mt-6 text-center font-black uppercase text-xs tracking-widest h-4"></div>
        <div class="grid grid-cols-2 gap-4 mt-auto">
            <button onclick="clearCanvas()" class="bg-zinc-900 text-white py-5 rounded-3xl font-black uppercase text-xs">Clear</button>
            <button onclick="verifyDrawing()" class="bg-white text-black py-5 rounded-3xl font-black uppercase text-xs">Verify</button>
        </div>
    </div>

    <script>
        // Research-backed Radical Data for HSK1
        const radMap = {
            "爱": ["心", "xīn", "Heart / Emotion"], "八": ["八", "bā", "Eight / Divide"],
            "爸": ["父", "fù", "Father"], "不": ["一", "yī", "One / Line"],
            "吃": ["口", "kǒu", "Mouth"], "大": ["大", "dà", "Big / Person"],
            "的": ["白", "bái", "White / Clear"], "点": ["火", "huǒ", "Fire / Dots"],
            "电": ["田", "tián", "Field"], "读": ["言", "yán", "Speech"],
            "对": ["寸", "cùn", "Inch / Rule"], "多": ["夕", "xī", "Evening"],
            "二": ["二", "èr", "Two"], "饭": ["食", "shí", "Food"],
            "飞": ["飞", "fēi", "Fly"], "个": ["人", "rén", "Person"],
            "工": ["工", "gōng", "Work"], "汉": ["水", "shuǐ", "Water"],
            "好": ["女", "nǚ", "Woman"], "喝": ["口", "kǒu", "Mouth"],
            "回": ["囗", "wéi", "Enclosure"], "会": ["人", "rén", "Person"],
            "几": ["几", "jǐ", "Table / Small"], "家": ["宀", "mián", "Roof"],
            "叫": ["口", "kǒu", "Mouth"], "看": ["目", "mù", "Eye"],
            "开": ["廾", "gǒng", "Hands Joined"], "来": ["木", "mù", "Tree / Wood"],
            "妈": ["女", "nǚ", "Woman"], "买": ["乙", "yǐ", "Second / Hook"],
            "猫": ["豸", "zhì", "Cat/Beast"], "米": ["米", "mǐ", "Rice"],
            "明": ["日", "rì", "Sun"], "哪": ["口", "kǒu", "Mouth"],
            "那": ["邑", "yì", "City"], "你": ["人", "rén", "Person"],
            "年": ["干", "gàn", "Dry / Shield"], "女": ["女", "nǚ", "Woman"],
            "朋": ["肉", "ròu", "Meat / Moon"], "七": ["一", "yī", "One"],
            "钱": ["金", "jīn", "Gold / Metal"], "请": ["言", "yán", "Speech"],
            "去": ["厶", "sī", "Private"], "热": ["火", "huǒ", "Fire"],
            "人": ["人", "rén", "Person"], "三": ["一", "yī", "One"],
            "上": ["一", "yī", "One"], "少": ["小", "xiǎo", "Small"],
            "十": ["十", "shí", "Ten"], "是": ["日", "rì", "Sun"],
            "书": ["丨", "gǔn", "Line"], "水": ["水", "shuǐ", "Water"],
            "说": ["言", "yán", "Speech"], "四": ["囗", "wéi", "Enclosure"],
            "他": ["人", "rén", "Person"], "她": ["女", "nǚ", "Woman"],
            "太": ["大", "dà", "Big"], "天": ["大", "dà", "Big"],
            "听": ["口", "kǒu", "Mouth"], "我": ["戈", "gē", "Spear"],
            "五": ["二", "èr", "Two"], "下": ["一", "yī", "One"],
            "小": ["小", "xiǎo", "Small"], "写": ["冖", "mì", "Cover"],
            "谢": ["言", "yán", "Speech"], "一": ["一", "yī", "One"],
            "衣": ["衣", "yī", "Clothes"], "医": ["匚", "fāng", "Box"],
            "有": ["月", "yuè", "Moon / Meat"], "在": ["土", "tǔ", "Earth"],
            "这": ["辵", "chuò", "Walk"], "中": ["丨", "gǔn", "Line"],
            "住": ["人", "rén", "Person"], "桌": ["木", "mù", "Wood"],
            "子": ["子", "zǐ", "Son / Child"], "坐": ["土", "tǔ", "Earth"],
            "做": ["人", "rén", "Person"]
        };

        const rawData = [["爱","ài","love"],["八","bā","eight"],["爸爸","bàba","dad"],["杯子","bēi zi","cup"],["北京","běi jīng","Beijing"],["本","běn","measure word"],["不客气","bú kè qì","welcome"],["不","bù","no"],["菜","cài","dish"],["茶","chá","tea"],["吃","chī","eat"],["出租车","chū zū chē","taxi"],["打电话","dǎ diàn huà","call"],["大","dà","big"],["的","de","'s"],["点","diǎn","o'clock"],["电脑","diàn nǎo","computer"],["电视","diàn shì","TV"],["电影","diàn yǐng","movie"],["东西","dōng xi","thing"],["都","dōu","all"],["读","dú","read"],["对不起","duì bu qǐ","sorry"],["多","duō","many"],["多少","duō shao","how many"],["儿子","ér zi","son"],["二","èr","two"],["饭店","fàn diàn","restaurant"],["飞机","fēijī","plane"],["分钟","fēnzhōng","minute"],["高兴","gāoxìng","happy"],["个","gè","unit"],["工作","gōngzuò","work"],["汉语","hànyǔ","Chinese"],["好","hǎo","good"],["喝","hē","drink"],["和","hé","and"],["很","hěn","very"],["后面","hòumiàn","behind"],["回","huí","back"],["会","huì","can"],["几","jǐ","how many"],["家","jiā","home"],["叫","jiào","call"],["今天","jīntiān","today"],["九","jiǔ","nine"],["看","kàn","look"],["看见","kànjiàn","see"],["块","kuài","piece"],["来","lái","come"],["老师","lǎoshī","teacher"],["了","le","!"],["冷","lěng","cold"],["里","lǐ","in"],["零","líng","zero"],["六","liù","six"],["妈妈","mā ma","mom"],["买","mǎi","buy"],["猫","māo","cat"],["没关系","méi guān xi","no prob"],["没有","méiyǒu","not have"],["米饭","mǐfàn","rice"],["明天","míngtiān","tomorrow"],["名字","míngzi","name"],["哪","nǎ","which"],["那","nà","that"],["呢","ne","?"],["能","néng","can"],["你","nǐ","you"],["年","nián","year"],["女儿","nǚ'ér","daughter"],["朋友","péngyou","friend"],["漂亮","piàoliang","pretty"],["苹果","píngguǒ","apple"],["七","qī","seven"],["钱","qián","money"],["前面","qiánmiàn","front"],["请","qǐng","please"],["去","qù","go"],["热","rè","hot"],["人","rén","person"],["认识","rènshi","know"],["三","sān","three"],["商店","shāngdiàn","shop"],["上","shàng","up"],["上午","shàngwǔ","am"],["少","shǎo","few"],["谁","shéi","who"],["什么","shénme","what"],["十","shí","ten"],["时候","shíhou","time"],["是","shì","is"],["书","shū","book"],["水","shuǐ","water"],["水果","shuǐguǒ","fruit"],["睡觉","shuìjiào","sleep"],["说话","shuōhuà","talk"],["四","sì","four"],["岁","suì","age"],["他","tā","he"],["她","tā","she"],["太","tài","too"],["天气","tiānqì","weather"],["听","tīng","listen"],["同学","tóngxué","classmate"],["喂","wèi","hey"],["我","wǒ","I"],["我们","wǒmen","we"],["五","wǔ","five"],["喜欢","xǐhuan","like"],["下","xià","down"],["下午","xiàwǔ","pm"],["下雨","xiàyǔ","rain"],["先生","xiānsheng","mr"],["现在","xiànzài","now"],["想","xiǎng","think"],["小","xiǎo","small"],["小姐","xiǎojiě","ms"],["些","xiē","some"],["写","xiě","write"],["谢谢","xièxie","thanks"],["星期","xīngqī","week"],["学生","xuésheng","student"],["学习","xuéxí","study"],["学校","xuéxiào","school"],["一","yī","one"],["一点儿","yìdiǎnr","little"],["医生","yīshēng","doc"],["医院","yīyuàn","hosp"],["衣服","yīfu","clothes"],["椅子","yǐzi","chair"],["有","yǒu","have"],["月","yuè","month"],["再见","zàijiàn","bye"],["在","zài","at"],["怎么","zěnme","how"],["怎么样","zěnmeyàng","how?"],["这","zhè","this"],["中国","zhōngguó","China"],["中午","zhōngwǔ","noon"],["住","zhù","live"],["桌子","zhuōzi","table"],["字","zì","word"],["昨天","zuótiān","yday"],["坐","zuò","sit"],["做","zuò","do"]];

        let vocab = [];
        let index = 0;
        let drawing = false;
        let strokes = [];

        function init() {
            const saved = JSON.parse(localStorage.getItem('hsk_elite_v2')) || {};
            vocab = rawData.map((d, i) => ({
                id: i, h: d[0], p: d[1], e: d[2], status: saved[d[0]] || 'normal'
            }));
            updateStats();
        }

        function save() {
            const progress = {};
            vocab.forEach(v => { if(v.status !== 'normal') progress[v.h] = v.status; });
            localStorage.setItem('hsk_elite_v2', JSON.stringify(progress));
            updateStats();
        }

        function updateStats() {
            const mastered = vocab.filter(v => v.status === 'mastered').length;
            const perc = Math.round((mastered / vocab.length) * 100);
            document.getElementById('stats').innerText = `${mastered} / ${vocab.length} MASTERED`;
            document.getElementById('progressBar').style.width = perc + '%';
            document.getElementById('percLabel').innerText = perc + '%';
        }

        function showCard() {
            const w = vocab[index];
            document.getElementById('hanzi').innerText = w.h;
            document.getElementById('pinyin').innerText = w.p;
            document.getElementById('english').innerText = w.e;
            document.getElementById('card').classList.remove('flipped');
            renderList();
        }

        function setStatus(s) {
            vocab[index].status = s;
            save();
            nextCard();
        }

        function nextCard() { index = (index + 1) % vocab.length; showCard(); }
        function prevCard() { index = (index - 1 + vocab.length) % vocab.length; showCard(); }
        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
        function startApp() { document.getElementById('home').classList.add('hidden'); document.getElementById('study').classList.remove('hidden'); showCard(); }

        function openInfo() {
            const w = vocab[index];
            const char = w.h[0];
            const rInfo = radMap[char] || ["?", "?", "Unknown"];
            
            document.getElementById('i-hanzi').innerText = char;
            document.getElementById('i-pinyin').innerText = w.p;
            document.getElementById('i-def').innerText = w.e;
            document.getElementById('i-rad').innerText = rInfo[0];
            document.getElementById('i-radP').innerText = rInfo[1];
            document.getElementById('i-radM').innerText = rInfo[2];
            document.getElementById('strokeImg').src = `https://www.mdbg.net/chinese/dictionary-images/stroke-anim/${char.charCodeAt(0)}.gif`;
            
            document.getElementById('infoModal').classList.remove('hidden');
        }

        function closeInfo() { document.getElementById('infoModal').classList.add('hidden'); }

        // DRAWING LOGIC
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function openWrite() { 
            document.getElementById('drawModal').classList.remove('hidden'); 
            document.getElementById('drawTarget').innerText = vocab[index].h[0];
            clearCanvas(); 
        }
        function closeWrite() { document.getElementById('drawModal').classList.add('hidden'); }

        canvas.width = 400; canvas.height = 400;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            drawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            strokes.push([[p.x], [p.y], [Date.now()]]);
            e.preventDefault();
        }

        function draw(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.strokeStyle = '#ffffff';
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            const s = strokes[strokes.length - 1];
            s[0].push(p.x); s[1].push(p.y); s[2].push(Date.now());
            e.preventDefault();
        }

        function stopDrawing() { drawing = false; }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        function clearCanvas() { 
            ctx.clearRect(0,0,400,400); 
            strokes = []; 
            document.getElementById('drawResult').innerText = ""; 
        }

        function verifyDrawing() {
            const target = vocab[index].h[0];
            const fb = document.getElementById('drawResult');
            fb.innerText = "Processing...";
            
            fetch("https://www.google.com.tw/inputtools/request?ime=handwriting&app=autofill&hl=zh-CN&oe=UTF-8", {
                method: 'POST',
                body: JSON.stringify({
                    "options": "enable_pre_space",
                    "requests": [{"writing_guide": {"writing_area_width": 400, "writing_area_height": 400}, "ink": strokes}]
                })
            }).then(r => r.json()).then(data => {
                const results = data[1][0][1];
                if(results.includes(target)) {
                    fb.className = "text-emerald-400 mt-6 text-center font-black uppercase text-xs tracking-widest";
                    fb.innerText = "Perfect Match";
                } else {
                    fb.className = "text-rose-500 mt-6 text-center font-black uppercase text-xs tracking-widest";
                    fb.innerText = `Try Again (Detected: ${results[0] || '?'})`;
                }
            }).catch(() => fb.innerText = "Error - Check Internet");
        }

        function renderList() {
            const list = document.getElementById('wordList');
            list.innerHTML = '';
            vocab.forEach(v => {
                const div = document.createElement('div');
                div.className = `list-item p-4 flex justify-between items-center rounded-xl text-[10px] font-black uppercase ${v.status === 'mastered' ? 'mastered-tag' : (v.status === 'review' ? 'review-tag' : '')}`;
                if(v.id === vocab[index].id) div.style.background = "#1a1a1a";
                div.innerHTML = `<span>${v.h}</span> <span class="text-zinc-600">${v.p}</span>`;
                div.onclick = () => { index = v.id; showCard(); };
                list.appendChild(div);
            });
        }

        function resetData() { if(confirm("Clear all?")) { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
