<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK App</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background-color: #ffe4ec; }

/* Flashcard */
.flip-card { perspective: 1000px; }
.flip-inner { transition: transform 0.6s; transform-style: preserve-3d; }
.flipped { transform: rotateY(180deg); }

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
}
.back { transform: rotateY(180deg); }

/* Canvas */
canvas {
    border: 2px solid black;
    border-radius: 10px;
    touch-action: none;
}
</style>
</head>

<body class="p-6 text-center">

<!-- ===== HOME ===== -->
<div id="home">
    <h1 class="text-3xl font-bold mb-6">My Flashcards</h1>

    <div onclick="openSet()" class="bg-white p-6 rounded-xl shadow cursor-pointer">
        HSK 1
    </div>
</div>

<!-- ===== FLASHCARD PAGE ===== -->
<div id="flashPage" class="hidden">

<button onclick="goHome()" class="mb-4 bg-white px-3 py-2 rounded">← Back</button>

<select onchange="filterMode=this.value; showCard();" class="mb-4 p-2 rounded">
    <option value="all">All</option>
    <option value="unknown">Unknown Only</option>
</select>

<div class="flip-card w-80 h-60 mx-auto relative">
    <div id="card" class="flip-inner w-full h-full relative">

        <div class="front bg-white rounded-xl flex items-center justify-center text-5xl">
            <span id="hanzi"></span>
        </div>

        <div class="back bg-pink-200 rounded-xl flex flex-col justify-center items-center">
            <p id="pinyin"></p>
            <p id="english"></p>
        </div>

    </div>
</div>

<div class="flex justify-center gap-2 mt-4">
    <button onclick="prevCard()" class="bg-white px-3 py-2 rounded">⬅️</button>
    <button onclick="markKnown()" class="bg-green-400 px-3 py-2 rounded">Know</button>
    <button onclick="markUnknown()" class="bg-red-400 px-3 py-2 rounded">Don't</button>
    <button onclick="openInfo()" class="bg-blue-300 px-3 py-2 rounded">Info</button>
    <button onclick="openWrite()" class="bg-pink-400 px-3 py-2 rounded">Write</button>
    <button onclick="nextCard()" class="bg-white px-3 py-2 rounded">➡️</button>
</div>

</div>

<!-- ===== INFO POPUP ===== -->
<div id="infoPopup" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
<div class="bg-white p-6 rounded w-80 text-left">

<h2 class="text-lg font-bold mb-2">Word Info</h2>

<p><b>Pinyin:</b> <span id="infoPinyin"></span></p>
<p><b>Meaning:</b> <span id="infoEnglish"></span></p>
<p><b>Radical:</b> <span id="infoRadical"></span></p>

<img id="infoStroke" class="mx-auto my-3 w-32">

<button onclick="closeInfo()" class="bg-pink-400 px-3 py-2 rounded w-full">Close</button>

</div>
</div>

<!-- ===== WRITE POPUP ===== -->
<div id="writePopup" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
<div class="bg-white p-6 rounded w-80">

<img id="stroke" class="mx-auto mb-3 w-32">

<canvas id="canvas" width="250" height="250"></canvas>

<div class="flex justify-between mt-3">
    <button onclick="clearCanvas()" class="bg-gray-300 px-3 py-1 rounded">Clear</button>
    <button onclick="closeWrite()" class="bg-pink-400 px-3 py-1 rounded">Done</button>
</div>

</div>
</div>

<!-- ===== END SCREEN ===== -->
<div id="endScreen" class="hidden">
<h2 class="text-2xl font-bold">Well done 🎉</h2>
<p>You've finished the set!</p>

<button onclick="goHome()" class="mt-4 bg-pink-400 px-4 py-2 rounded">
Back to Home
</button>
</div>

<script>

// ===== DATA =====
let vocab = [
{h:"爱", p:"ài", e:"love", radical:"爫", known:false},
{h:"八", p:"bā", e:"eight", radical:"八", known:false},
{h:"白", p:"bái", e:"white; clear", radical:"白", known:false},
{h:"吃", p:"chī", e:"eat", radical:"口", known:false},
{h:"喝", p:"hē", e:"drink", radical:"口", known:false},
{h:"好", p:"hǎo", e:"good; well", radical:"女", known:false}
];

let filtered = [];
let index = 0;
let filterMode = "all";

// ===== NAV =====
function openSet() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("flashPage").classList.remove("hidden");
    resetSet();
}

function goHome() {
    location.reload();
}

// ===== FILTER =====
function applyFilter() {
    filtered = (filterMode === "unknown")
        ? vocab.filter(v=>!v.known)
        : vocab;
}

// ===== SHOW CARD =====
function showCard() {
    applyFilter();

    if (index >= filtered.length) {
        document.getElementById("flashPage").classList.add("hidden");
        document.getElementById("endScreen").classList.remove("hidden");
        return;
    }

    let w = filtered[index];

    document.getElementById("card").classList.remove("flipped");
    document.getElementById("hanzi").innerText = w.h;
    document.getElementById("pinyin").innerText = w.p;
    document.getElementById("english").innerText = w.e;

    let code = w.h.charCodeAt(0);
    document.getElementById("stroke").src =
    `https://cdn.jsdelivr.net/gh/skishore/makemeahanzi@master/graphics/${code}.gif`;
}

// ===== NAV CARDS =====
function nextCard() { index++; showCard(); }
function prevCard() { if(index>0) index--; showCard(); }

// ===== MARK =====
function markKnown() {
    filtered[index].known = true;
    nextCard();
}

function markUnknown() {
    filtered[index].known = false;
    nextCard();
}

// ===== INFO =====
function openInfo() {
    let w = filtered[index];

    document.getElementById("infoPinyin").innerText = w.p;
    document.getElementById("infoEnglish").innerText = w.e;
    document.getElementById("infoRadical").innerText = w.radical;

    document.getElementById("infoStroke").src =
    `https://cdn.jsdelivr.net/gh/skishore/makemeahanzi@master/graphics/${w.h.charCodeAt(0)}.gif`;

    document.getElementById("infoPopup").classList.remove("hidden");
}

function closeInfo() {
    document.getElementById("infoPopup").classList.add("hidden");
}

// ===== WRITE =====
function openWrite() {
    document.getElementById("writePopup").classList.remove("hidden");
}

function closeWrite() {
    document.getElementById("writePopup").classList.add("hidden");
}

// ===== FLIP =====
document.addEventListener("keydown", e=>{
    if (e.code==="Space") {
        document.getElementById("card").classList.toggle("flipped");
    }
});

// ===== CANVAS =====
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let drawing=false;

canvas.addEventListener("mousedown", ()=>drawing=true);
canvas.addEventListener("mouseup", ()=>drawing=false);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", ()=>drawing=true);
canvas.addEventListener("touchend", ()=>drawing=false);
canvas.addEventListener("touchmove", draw);

function draw(e){
    if(!drawing)return;
    let rect=canvas.getBoundingClientRect();
    let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

    ctx.lineWidth=4;
    ctx.lineCap="round";
    ctx.lineTo(x,y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x,y);
}

function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ===== INIT =====
function resetSet(){
    index = 0;
    showCard();
}

</script>

</body>
</html>
