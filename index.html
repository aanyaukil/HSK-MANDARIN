<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK App</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background-color: #ffe4ec; }

/* Flashcard */
.flip-card { perspective: 1000px; }
.flip-inner {
    transition: transform 0.6s;
    transform-style: preserve-3d;
}
.flipped { transform: rotateY(180deg); }

.front, .back {
    backface-visibility: hidden;
    position: absolute;
    width: 100%;
    height: 100%;
}
.back { transform: rotateY(180deg); }

/* Canvas */
canvas {
    border: 2px solid black;
    border-radius: 10px;
    touch-action: none;
}
</style>
</head>

<body class="p-6 text-center">

<!-- ===== MAIN PAGE ===== -->
<div id="home">
    <h1 class="text-3xl font-bold mb-6">My Flashcards</h1>

    <div id="sets" class="space-y-4">
        <div onclick="openSet('HSK1')"
        class="bg-white p-6 rounded-2xl shadow cursor-pointer">
            HSK 1
        </div>
    </div>

    <button onclick="addSet()" class="mt-6 bg-pink-400 px-4 py-2 rounded">
        + Add Set
    </button>
</div>

<!-- ===== FLASHCARD PAGE ===== -->
<div id="flashPage" class="hidden">

<button onclick="goHome()" class="mb-4 bg-white px-3 py-2 rounded">← Back</button>

<div class="flip-card w-80 h-60 mx-auto relative">
    <div id="card" class="flip-inner w-full h-full relative">

        <div class="front bg-white rounded-2xl flex items-center justify-center text-5xl font-bold">
            <span id="hanzi"></span>
        </div>

        <div class="back bg-pink-200 rounded-2xl flex flex-col justify-center items-center">
            <p id="pinyin"></p>
            <p id="english" class="italic"></p>
        </div>

    </div>
</div>

<div class="flex justify-center gap-4 mt-6">
    <button onclick="prevCard()" class="bg-white px-4 py-2 rounded">⬅️</button>
    <button onclick="openWrite()" class="bg-pink-400 px-4 py-2 rounded">Write</button>
    <button onclick="nextCard()" class="bg-white px-4 py-2 rounded">➡️</button>
</div>

</div>

<!-- ===== WRITE POPUP ===== -->
<div id="writePopup"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

<div class="bg-white p-6 rounded-xl w-80">

    <h2 class="text-lg mb-2">Practice Writing</h2>

    <img id="stroke" class="mx-auto mb-3 w-32">

    <canvas id="canvas" width="250" height="250"></canvas>

    <div class="flex justify-between mt-3">
        <button onclick="clearCanvas()" class="bg-gray-300 px-3 py-1 rounded">Clear</button>
        <button onclick="closeWrite()" class="bg-pink-400 px-3 py-1 rounded">Done</button>
    </div>

</div>
</div>

<script>

// ===== DATA =====
let sets = {
    HSK1: [
        {h:"爱", p:"ài", e:"love"},
        {h:"八", p:"bā", e:"eight"},
        {h:"爸爸", p:"bàba", e:"dad"},
        {h:"白", p:"bái", e:"white"},
        {h:"北京", p:"běijīng", e:"Beijing"},
        {h:"不", p:"bù", e:"no"},
        {h:"吃", p:"chī", e:"eat"},
        {h:"喝", p:"hē", e:"drink"},
        {h:"老师", p:"lǎoshī", e:"teacher"},
        {h:"学生", p:"xuésheng", e:"student"},
        {h:"中国", p:"zhōngguó", e:"China"},
        {h:"谢谢", p:"xièxie", e:"thank you"}
    ]
};

let currentSet = [];
let index = 0;

// ===== NAVIGATION =====
function openSet(name) {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("flashPage").classList.remove("hidden");

    currentSet = sets[name];
    index = 0;
    showCard();
}

function goHome() {
    document.getElementById("flashPage").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}

// ===== FLASHCARD =====
function showCard() {
    let card = document.getElementById("card");
    card.classList.remove("flipped");

    let w = currentSet[index];
    document.getElementById("hanzi").innerText = w.h;
    document.getElementById("pinyin").innerText = w.p;
    document.getElementById("english").innerText = w.e;

    document.getElementById("stroke").src =
    `https://cdn.jsdelivr.net/gh/skishore/makemeahanzi@master/graphics/${w.h.charCodeAt(0)}.gif`;
}

function nextCard() {
    index = (index + 1) % currentSet.length;
    showCard();
}

function prevCard() {
    index = (index - 1 + currentSet.length) % currentSet.length;
    showCard();
}

// ===== FLIP (SPACEBAR) =====
document.addEventListener("keydown", (e)=>{
    if (e.code === "Space") {
        document.getElementById("card").classList.toggle("flipped");
    }
});

// ===== WRITE POPUP =====
function openWrite() {
    document.getElementById("writePopup").classList.remove("hidden");
}

function closeWrite() {
    document.getElementById("writePopup").classList.add("hidden");
}

// ===== CANVAS =====
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", ()=>drawing=true);
canvas.addEventListener("mouseup", ()=>drawing=false);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", ()=>drawing=true);
canvas.addEventListener("touchend", ()=>drawing=false);
canvas.addEventListener("touchmove", draw);

function draw(e) {
    if (!drawing) return;

    let rect = canvas.getBoundingClientRect();
    let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

    ctx.lineWidth = 4;
    ctx.lineCap = "round";

    ctx.lineTo(x,y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x,y);
}

function clearCanvas() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ===== ADD SET =====
function addSet() {
    let name = prompt("Set name:");
    if (name) {
        sets[name] = [];
        alert("Set created (you can add words in code)");
    }
}

</script>

</body>
</html>
